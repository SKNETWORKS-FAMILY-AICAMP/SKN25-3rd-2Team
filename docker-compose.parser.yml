services:
  arxplore-layout-parser:
    container_name: arxplore-layout-parser
    image: arxplore-layout-parser
    build:
      context: .
      dockerfile: docker/parser/Dockerfile
    gpus: all
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    ports:
      - "${LAYOUT_PARSER_PORT:-5060}:5060"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5060/', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
